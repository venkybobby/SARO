name: SARO CI/CD — Fly.io

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       saro_test
          POSTGRES_USER:     saro
          POSTGRES_PASSWORD: saro_test_pw
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxmlsec1-dev libxml2-dev pkg-config \
            libpango-1.0-0 libharfbuzz0b libfontconfig1 libcairo2

      - name: Install dependencies
        run: pip install -r requirements.txt ruff "mypy>=1.0,<2.0" pytest pytest-asyncio

      - name: Show installed versions
        run: pip show mypy ruff python3-saml weasyprint | grep -E "^(Name|Version):"

      - name: Lint (ruff)
        run: ruff check . --output-format=github

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports

      - name: Run pytest
        env:
          DATABASE_URL:        postgresql://saro:saro_test_pw@localhost:5432/saro_test
          DB_SSLMODE:          disable
          JWT_SECRET_KEY:      test-secret-key-not-for-production
          JWT_ALGORITHM:       HS256
          ENVIRONMENT:         test
          SARO_DEMO_TENANT_ID: ${{ secrets.SARO_DEMO_TENANT_ID }}
        run: pytest tests/ -v --tb=short -x --ignore=tests/test_frontend_login.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_SARO_API_URL: ""
        run: npm run build

  deploy:
    # Migrations are applied by the app itself at startup, BEFORE it serves
    # traffic (main.lifespan -> apply_pending_migrations(), idempotent and
    # advisory-locked; a migration failure crashes the boot so a bad schema is
    # never served).  A separate CI migrate job duplicated that and could only
    # reach Supabase via the pooler — which it was misconfigured for — so it
    # blocked every deploy.  Deploy gates on test + frontend only.
    needs: [test, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --wait-timeout=120

  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for Fly health (schema_ok must be true)
        run: |
          for i in $(seq 1 12); do
            BODY=$(curl -s https://saro-backend.fly.dev/health)
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                     https://saro-backend.fly.dev/health)
            echo "Attempt $i: HTTP $STATUS — $BODY"
            [ "$STATUS" = "200" ] && echo "Health OK" && exit 0
            sleep 10
          done
          echo "Health check failed after 2 minutes" && exit 1
