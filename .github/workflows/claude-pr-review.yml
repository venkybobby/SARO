name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main, develop]

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  guard:
    name: Loop guard (kill switch / cap)
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.guard.outputs.proceed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - id: guard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install --quiet pyyaml requests
          if python scripts/loop_guard.py pr-babysitter; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  review:
    name: Claude Code Review
    needs: guard
    runs-on: ubuntu-latest
    # Skip draft PRs and honour the loop kill switch / daily cap
    if: github.event.pull_request.draft == false && needs.guard.outputs.proceed == 'true'

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          max_tokens: 20000
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are a senior engineer and AI governance specialist reviewing a pull request for the SARO platform (Smart AI Risk Orchestrator v8.0.0).

            Review this PR against the following constraints — flag any violation clearly:

            ## SARO Non-Negotiables (block if violated)
            1. SARO accepts only `prompt` + `raw_output` — core scoring never calls external AI models (one disclosed exception: the optional, off-by-default Gate-3 LLM-judge, enabled only when its API key is set — see docs/COMPLIANCE_CLAIMS_MATRIX.md "External Model Usage")
            2. Returns only risk score (0–100 int), TRACE timeline, remediation guidance
            3. Never writes to client systems
            4. Never certifies compliance (evidence support only)
            5. Human-in-the-loop always — no automated sign-off
            6. Read-only integration posture

            ## API Conventions (flag if violated)
            - All route handlers must be async
            - URL prefix must be /api/v1/
            - Pydantic v2 schemas only
            - No blocking calls (requests, time.sleep) in async handlers
            - Standard error response shape: {code, message, request_id}
            - JWT middleware on all non-public routes

            ## Compliance Language (flag if found)
            These strings must never appear in code or docs:
            - "certifies compliance", "NIST compliant", "EU AI Act compliant", "ISO 42001 certified", "audit passed"

            ## Scoring Invariants (flag if violated)
            - risk_score must be int, 0–100, never negative
            - TRACE events must be append-only
            - KS-test p-value threshold: 0.05 (drift), 0.01 (critical)

            ## Output Format
            Provide a structured review with sections:
            1. **Summary** (2–3 sentences)
            2. **Blocking Issues** (must fix before merge)
            3. **Non-blocking Issues** (should fix)
            4. **Approved patterns** (what was done well)

            Be direct. Flag real issues only — no padding.

      - name: Record run (observability)
        if: always()
        run: |
          python3 scripts/loop_runlog.py pr-babysitter \
            --outcome ok --detail "PR #${{ github.event.pull_request.number }} review"
