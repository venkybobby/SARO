name: Claude CI Fix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, develop]

concurrency:
  group: claude-ci-fix-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  diagnose-and-fix:
    name: Diagnose and Fix Test Failure
    runs-on: ubuntu-latest
    # Only run when CI has failed
    if: github.event.workflow_run.conclusion == 'failure'

    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: read
      actions: read

    steps:
      - name: Checkout failing commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 10

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Capture test output
        id: test-output
        run: |
          python -m pytest tests/ -v --tb=long --no-header 2>&1 | tee test_output.txt || true
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Claude Diagnose and Fix
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          max_tokens: 60000
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            The SARO platform CI has failed. Your job is to diagnose the failure and push a fix.

            ## Constraints (never violate)
            - Do NOT modify existing tests to make them pass — fix the source code
            - Do NOT add `# noqa`, `# type: ignore`, or skip markers to hide failures
            - Do NOT modify risk_score logic to return values outside 0–100
            - Do NOT add blocking calls (requests, time.sleep) to async handlers
            - After fixing, run `python -m pytest tests/ -q` to verify the fix works
            - Create one commit with message: `fix(ci): resolve test failure — <short description>`
            - This is attempt 1 of 1 — if you cannot fix with confidence, comment on the PR explaining the failure instead of pushing a broken fix

            ## Test output from failing run
            Read the file `test_output.txt` to see the full failure output.

            ## Steps
            1. Read test_output.txt to identify the root cause
            2. Read the relevant source files
            3. Implement the minimal fix
            4. Run pytest to confirm green
            5. Commit and push the fix

            If the fix would require changing SARO non-negotiables or test assertions, do not push — instead create a GitHub issue explaining the conflict.

      - name: Notify on failure to fix
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.workflow_run.pull_requests[0]?.number,
              body: '⚠️ Claude CI Fix attempted but could not resolve the failure automatically. Manual investigation required. See workflow run: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId
            });
