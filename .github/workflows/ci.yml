name: SARO CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff mypy
      - run: ruff check .
      - run: mypy . --ignore-missing-imports

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      SARO_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt pytest pytest-cov pytest-asyncio
      - run: pytest tests/ -m "unit" --tb=short -q
      - run: pytest tests/ -m "integration" --tb=short -q
      - run: pytest --cov=. --cov-report=xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install bandit safety trufflehog
      - run: bandit -r . -ll -x ./tests,./saro-data-framework --format json -o bandit-report.json || true
      - run: bandit -r . -ll -x ./tests,./saro-data-framework --severity-level high && echo "BANDIT_PASS=true"
      - run: safety check -r requirements.txt --full-report
      - name: TruffleHog Secret Scan
        run: trufflehog filesystem . --only-verified --fail

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [test, security]
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      SARO_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt -r frontend/requirements.txt playwright pytest-playwright
      - run: playwright install --with-deps chromium
      - run: pytest tests/ -m "e2e" --tb=short -q

  deploy:
    name: Deploy to Railway Staging
    runs-on: ubuntu-latest
    needs: [test, security, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy API to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: saro-api
      - name: Deploy Frontend to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: saro-frontend
