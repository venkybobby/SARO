[mypy]
ignore_missing_imports = True
explicit_package_bases = True
exclude = saro-data-framework
disable_error_code = import-untyped

[mypy-requests]
ignore_missing_imports = True

[mypy-yaml]
ignore_missing_imports = True

# ── Pre-existing type errors in files not modified by PR #6 ──────────────────
