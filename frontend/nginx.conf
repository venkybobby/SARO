server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unknown paths return index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* calls to backend — avoids CORS entirely in production
    location /api/ {
        proxy_pass          https://saro-backend.fly.dev/api/;
        proxy_http_version  1.1;
        proxy_set_header    Host              saro-backend.fly.dev;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_read_timeout  120s;
    }

    # Gzip static assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cache static assets (JS/CSS bundles have content hashes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
