[services.backend.build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[services.backend.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[services.backend.deploy.environmentVariables]
PYTHONPATH = "/app"
PYTHONUNBUFFERED = "1"
SUPABASE_PROJECT_REF = "fktfhtygvwqlmoazmhdf"

# STORY-105: the Streamlit `frontend` Railway service was removed. The React/Vite
# frontend deploys to Vercel (see CLAUDE.md infrastructure), not Railway. Railway
# hosts only the FastAPI backend service above (healthcheck /health).
