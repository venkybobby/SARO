[services.backend.build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[services.backend.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[services.backend.deploy.environmentVariables]
PYTHONPATH = "/app"
PYTHONUNBUFFERED = "1"
SUPABASE_PROJECT_REF = "fktfhtygvwqlmoazmhdf"

[services.frontend.build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.frontend"

[services.frontend.deploy]
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[services.frontend.deploy.environmentVariables]
PYTHONPATH = "/app"
PYTHONUNBUFFERED = "1"
