# fly.toml app configuration file generated for saro-backend on 2026-06-07T11:18:31-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'saro-backend'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  ENVIRONMENT = 'production'
  LOG_LEVEL = 'info'
  PORT = '8000'
  # gunicorn.conf.py reads GUNICORN_WORKERS (not WORKERS).
  # 1 worker keeps RSS well under 1 GB on a shared-cpu-1x machine.
  # Each UvicornWorker loads ~175 MB; 1 worker + master + OS = ~300 MB.
  GUNICORN_WORKERS = '1'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
