# fly.toml — SARO backend production deployment
# App:    saro-backend
# Region: dfw (Dallas — closest to Georgetown TX)
# Deploy: flyctl deploy --app saro-backend

app            = "saro-backend"
primary_region = "dfw"

[build]
  # Backend lives at repo root — Dockerfile, main.py, requirements.txt all here
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  LOG_LEVEL   = "info"
  PORT        = "8000"
  WORKERS     = "2"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = false   # CRITICAL — prevents cold-start loop on free tier
  auto_start_machines  = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"
