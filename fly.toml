# fly.toml — SARO backend (saro-backend)
# Deploy: flyctl deploy --app saro-backend
# DO NOT confuse with frontend/fly.toml (sarofrontend)

app            = 'saro-backend'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  ENVIRONMENT      = 'production'
  LOG_LEVEL        = 'info'
  PORT             = '8000'
  GUNICORN_WORKERS = '1'

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = 'off'
  auto_start_machines  = true
  min_machines_running = 1

  [[http_service.checks]]
    interval     = '30s'
    timeout      = '5s'
    grace_period = '10s'
    method       = 'GET'
    path         = '/health'

[[vm]]
  memory    = '1gb'
  cpu_kind  = 'shared'
  cpus      = 1
  memory_mb = 1024
