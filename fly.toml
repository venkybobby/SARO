# fly.toml — SARO production deployment configuration (S-301)
# App: saro-api
# Deploy: fly deploy

app = "saro-api"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  PORT        = "8080"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 200
    soft_limit = 100

[[services]]
  protocol    = "tcp"
  internal_port = 8080

  [[services.ports]]
    port     = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type       = "connections"
    hard_limit = 200
    soft_limit = 100

  [[services.tcp_checks]]
    interval      = "15s"
    timeout       = "2s"
    grace_period  = "5s"
    restart_limit = 0

  [[services.http_checks]]
    interval      = "30s"
    timeout       = "5s"
    grace_period  = "10s"
    method        = "GET"
    path          = "/health"
    protocol      = "http"

[checks]
  [checks.health]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    port         = 8080
    timeout      = "5s"
    type         = "http"

[[vm]]
  size        = "shared-cpu-1x"
  memory      = "512mb"
  cpu_kind    = "shared"
  cpus        = 1
